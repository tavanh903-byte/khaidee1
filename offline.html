<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ຂາຍດີ — ບໍ່ມີການເຊື່ອມຕໍ່</title>
<meta name="theme-color" content="#0a0a0a">
<style>
  :root { --gold: #c9a84c; --gold-light: #f0d080; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Sarabun', sans-serif;
    background: radial-gradient(ellipse 140% 100% at 50% 110%, #1c1000, #050300);
    color: #e8e0cc;
    min-height: 100dvh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px 24px; text-align: center;
  }
  .icon { font-size: 72px; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
  h1 {
    font-size: 22px; font-weight: 700; margin-bottom: 10px;
    color: transparent;
    background: linear-gradient(180deg, #fff9e0, #f0d060, #c9a84c);
    -webkit-background-clip: text; background-clip: text;
  }
  p { font-size: 14px; color: #a09880; line-height: 1.8; max-width: 280px; margin-bottom: 28px; }
  button {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: #000; border: none; border-radius: 14px;
    padding: 14px 32px; font-size: 15px; font-weight: 700;
    cursor: pointer; box-shadow: 0 4px 20px rgba(201,168,76,.4);
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-10px); }
  }
</style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>ບໍ່ມີການເຊື່ອມຕໍ່ອິນເຕີເນັດ</h1>
  <p>ກະລຸນາກວດສອບ Wi-Fi ຫຼື ອິນເຕີເນັດຂອງທ່ານ ແລ້ວລອງໃໝ່ອີກຄັ້ງ</p>
  <button onclick="location.reload()">🔄 ລອງໃໝ່</button>
</body>
</html>
